<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        
        .player-box {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 30px 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .radio-icon {
            font-size: 80px;
            margin-bottom: 15px;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .status {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 25px;
        }
        
        .play-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            color: #ff6b6b;
            font-size: 35px;
            cursor: pointer;
            margin: 0 auto 20px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .play-btn:active {
            transform: scale(0.95);
        }
        
        .play-btn.playing {
            background: rgba(255, 107, 107, 0.2);
            border-color: #feca57;
            color: #feca57;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.3);
        }
        
        .play-btn.loading {
            opacity: 0.6;
        }
        
        .message {
            padding: 12px;
            border-radius: 12px;
            margin-top: 15px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .message.error {
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
        }
        
        .message.success {
            background: rgba(46, 213, 115, 0.15);
            color: #2ed573;
        }
        
        .debug-info {
            margin-top: 20px;
            font-size: 11px;
            color: #555;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="player-box">
            <div class="radio-icon">📻</div>
            <h1>Mi Radio Web</h1>
            <div class="status">Listen2MyRadio</div>
            
            <button class="play-btn" id="playBtn" onclick="handlePlay()">
                ▶
            </button>
            
            <div id="messageBox"></div>
            
            <div class="debug-info" id="debugInfo">
                Iniciando...
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        let audio = null;
        let isPlaying = false;
        let playBtn = document.getElementById('playBtn');
        let messageBox = document.getElementById('messageBox');
        let debugInfo = document.getElementById('debugInfo');
        
        // Lista de métodos para probar
        const streamBase = 'http://37.157.242.105:33097/;';
        let currentMethod = 0;
        
        const methods = [
            {
                name: 'Proxy corsproxy.io',
                getUrl: () => 'https://corsproxy.io/?' + encodeURIComponent(streamBase)
            },
            {
                name: 'Proxy codecors',
                getUrl: () => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(streamBase)
            },
            {
                name: 'Directo (solo HTTP)',
                getUrl: () => streamBase,
                note: 'Solo funciona en HTTP, no en HTTPS'
            }
        ];
        
        function log(msg, isError = false) {
            console.log(msg);
            debugInfo.innerHTML += '<br>' + msg;
            if (isError) {
                showMessage(msg, true);
            }
        }
        
        function showMessage(msg, isError = false) {
            messageBox.innerHTML = `<div class="message ${isError ? 'error' : 'success'}">${msg}</div>`;
            if (!isError) {
                setTimeout(() => {
                    if (messageBox.textContent === msg) {
                        messageBox.innerHTML = '';
                    }
                }, 3000);
            }
        }
        
        function updateButton(type) {
            playBtn.className = 'play-btn';
            if (type === 'loading') {
                playBtn.classList.add('loading');
                playBtn.textContent = '⏳';
            } else if (type === 'playing') {
                playBtn.classList.add('playing');
                playBtn.textContent = '⏸';
            } else {
                playBtn.textContent = '▶';
            }
        }
        
        async function handlePlay() {
            if (isPlaying) {
                stopAudio();
                return;
            }
            
            // Intentar con el método actual
            await tryPlayMethod(currentMethod);
        }
        
        async function tryPlayMethod(methodIndex) {
            if (methodIndex >= methods.length) {
                log('❌ Todos los métodos fallaron. Prueba desde http://', true);
                showMessage('Error: Intenta abrir desde un navegador común', true);
                updateButton('stopped');
                return;
            }
            
            const method = methods[methodIndex];
            log(`🎯 Probando: ${method.name}...`);
            updateButton('loading');
            showMessage(`Conectando vía ${method.name}...`);
            
            try {
                // Detener audio anterior
                if (audio) {
                    audio.pause();
                    audio.src = '';
                    audio = null;
                }
                
                const url = method.getUrl();
                log(`URL: ${url}`);
                
                audio = new Audio();
                audio.src = url;
                audio.volume = 0.8;
                audio.preload = 'auto';
                
                // Timeout de 8 segundos para conectar
                const timeout = setTimeout(() => {
                    if (!isPlaying && audio) {
                        log(`⏰ Timeout con ${method.name}`);
                        audio.pause();
                        audio.src = '';
                        currentMethod++;
                        tryPlayMethod(currentMethod);
                    }
                }, 8000);
                
                await audio.play();
                
                clearTimeout(timeout);
                
                // Éxito
                isPlaying = true;
                updateButton('playing');
                showMessage('✅ ¡Transmitiendo!');
                log(`✅ Funcionó con: ${method.name}`);
                
                audio.onerror = (e) => {
                    log(`Error con ${method.name}: ${e.type}`, true);
                    isPlaying = false;
                    updateButton('stopped');
                    audio.src = '';
                    currentMethod++;
                    tryPlayMethod(currentMethod);
                };
                
                audio.onended = () => {
                    if (isPlaying) {
                        log('Stream terminó, reconectando...');
                        stopAudio();
                        setTimeout(() => handlePlay(), 2000);
                    }
                };
                
            } catch (error) {
                log(`❌ Falló ${method.name}: ${error.message}`, true);
                updateButton('stopped');
                currentMethod++;
                setTimeout(() => tryPlayMethod(currentMethod), 500);
            }
        }
        
        function stopAudio() {
            if (audio) {
                audio.pause();
                audio.src = '';
            }
            isPlaying = false;
            updateButton('stopped');
            showMessage('Reproducción detenida');
        }
        
        // Inicializar
        log('🟢 App lista');
        log(`Métodos disponibles: ${methods.length}`);
    </script>
</body>
</html>
