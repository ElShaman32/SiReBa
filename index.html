<!DOCTYPE html>
<html lang="es-VE">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0D2818">
    <title>🍌 Cambur Pintón</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #1A1A2E;
            --surface: #16213E;
            --cambur-yellow: #FFD700;
            --cambur-green: #7CB342;
            --text: #FFFFFF;
            --text-secondary: #A5D6A7;
            --border: rgba(124, 179, 66, 0.2);
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ─── HERO ─── */
        .hero {
            text-align: center;
            padding: 40px 20px 30px;
            background: linear-gradient(180deg, #0D2818 0%, #1A1A2E 100%);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('https://radio.camburpinton.com.ve/static/uploads/background.1778449035.png');
            background-repeat: repeat;
            background-size: 60px;
            opacity: 0.04;
        }

        .hero-content { position: relative; z-index: 1; }

        .logo-img {
            width: 120px;
            height: auto;
            max-width: 100%;
            filter: drop-shadow(0 0 25px rgba(124, 179, 66, 0.5));
            animation: float 3s ease-in-out infinite;
            border-radius: 50%;
            border: 2px solid rgba(124, 179, 66, 0.3);
            background: rgba(13, 40, 24, 0.6);
            padding: 8px;
            margin-bottom: 15px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .station-name {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #7CB342, #558B2F, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .tagline {
            font-size: 15px;
            color: #A5D6A7;
            margin-bottom: 5px;
            font-style: italic;
        }

        .hero-subtitle {
            font-size: 13px;
            color: #A5D6A7;
            font-style: italic;
        }

        /* ─── NOTICIAS ─── */
        .news-section {
            padding: 30px 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 5px;
            color: #FFFFFF;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background: #7CB342;
            margin: 8px auto 0;
            border-radius: 2px;
        }

        .news-update-time {
            text-align: center;
            font-size: 11px;
            color: #7CB342;
            margin-bottom: 20px;
        }

        .news-carousel {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius);
            background: var(--surface);
            border: 1px solid var(--border);
            min-height: 180px;
        }

        .news-slides {
            display: flex;
            transition: transform 0.3s ease;
            width: 100%;
        }

        .news-slide {
            flex: 0 0 100%;
            padding: 25px 20px;
            box-sizing: border-box;
        }

        .news-category {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .news-category-icon { font-size: 20px; }

        .news-title {
            font-size: 18px;
            font-weight: 800;
            color: #FFFFFF;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .news-excerpt {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .news-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
        }

        .news-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(124, 179, 66, 0.3);
            transition: all 0.3s;
            cursor: pointer;
        }

        .news-dot.active {
            background: #7CB342;
            width: 24px;
            border-radius: 4px;
        }

        .news-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(124, 179, 66, 0.3);
            color: white;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .news-nav:active { background: rgba(124, 179, 66, 0.3); }
        .news-nav.prev { left: 5px; }
        .news-nav.next { right: 5px; }

        /* ─── PLAYER ─── */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 2px solid var(--cambur-green);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
        }

        .player-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid var(--cambur-green);
            background: rgba(124, 179, 66, 0.1);
            color: var(--cambur-green);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .player-btn.playing {
            border-color: var(--cambur-yellow);
            color: var(--cambur-yellow);
            background: rgba(255, 215, 0, 0.1);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            font-weight: bold;
            color: var(--cambur-green);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .live-dot {
            width: 7px;
            height: 7px;
            background: var(--cambur-green);
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .now-playing-info {
            flex: 1;
            min-width: 0;
            text-align: center;
        }

        .now-playing-title {
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
            margin: 0 auto;
        }

        .now-playing-artist {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .strings-container {
            display: flex;
            gap: 2px;
            height: 16px;
            align-items: flex-end;
        }

        .string {
            width: 2px;
            border-radius: 1px;
            transition: height 0.1s;
        }

        .string-1 { background: #FFD700; }
        .string-2 { background: #FF8C00; }
        .string-3 { background: #FF4500; }
        .string-4 { background: #8B0000; }

        /* ─── FOOTER ─── */
        footer {
            text-align: center;
            padding: 20px 20px 80px;
            color: var(--text-secondary);
            font-size: 12px;
        }

        footer strong { color: #FFFFFF; }

        @media (max-width: 400px) {
            .station-name { font-size: 26px; }
            .logo-img { width: 100px; }
            .hero { padding: 30px 15px 20px; }
            .news-section { padding: 20px 15px; }
        }
    </style>
</head>
<body>

    <!-- 🍌 HERO -->
    <header class="hero">
        <div class="hero-content">
            <img src="https://radio.camburpinton.com.ve/static/uploads/background.1778449035.png" alt="Cambur Pintón" class="logo-img">
            <h1 class="station-name">Cambur Pintón</h1>
            <p class="tagline">🎙️ La Radio Más Chevere de Venezuela 🎙️</p>
            <p class="hero-subtitle">🎸 Con El Cuatro Bien Afinado</p>
        </div>
    </header>

    <!-- 📰 NOTICIAS -->
    <section class="news-section">
        <h2 class="section-title">📰 El Pintón News</h2>
        <div class="news-update-time" id="newsTime"></div>
        <div id="newsContainer">
            <p style="text-align:center;color:#A5D6A7;font-style:italic;padding:30px;">🍌 Cosechando noticias frescas...</p>
        </div>
    </section>

    <!-- 📱 FOOTER -->
    <footer>
        <strong>Leonel Sira</strong> & <strong>Yennyfer Reverol</strong>
    </footer>

    <!-- 🎧 PLAYER -->
    <div class="player-bar" id="playerBar">
        <button class="player-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <div class="live-indicator"><div class="live-dot"></div> EN VIVO</div>
        <div class="now-playing-info">
            <div class="now-playing-title" id="barTitle">Cambur Pintón</div>
            <div class="now-playing-artist" id="barArtist">Sintonizando</div>
        </div>
        <div class="strings-container" id="stringsContainer">
            <div class="string string-1" style="height:8px"></div>
            <div class="string string-2" style="height:8px"></div>
            <div class="string string-3" style="height:8px"></div>
            <div class="string string-4" style="height:8px"></div>
        </div>
    </div>

    <!-- 🧠 SCRIPTS -->
    <script>
        // ─── CONFIG ───
        const STREAM_URL = 'https://radio.camburpinton.com.ve/listen/cambur_pinton/radio.mp3';
        const API_URL = 'https://radio.camburpinton.com.ve/api/nowplaying/cambur_pinton';
        const API_KEY = '0aebf59628850e87:30b9574cf088d2e1bd100a8c96e87e98';
        const NEWS_URL = 'https://raw.githubusercontent.com/ElShaman32/SiReBa/refs/heads/main/noticias.json';

        // ─── AUDIO ───
        const playBtn = document.getElementById('playBtn');
        const barTitle = document.getElementById('barTitle');
        const barArtist = document.getElementById('barArtist');
        const stringsContainer = document.getElementById('stringsContainer');
        
        let audio = null;
        let isPlaying = false;
        let stringsInterval = null;

        function togglePlay() {
            if (isPlaying) { pauseAudio(); }
            else { playAudio(); }
        }

        function playAudio() {
            if (!audio) {
                audio = new Audio(STREAM_URL);
                audio.volume = 0.8;
                audio.preload = 'auto';
                audio.onerror = function() {
                    isPlaying = false;
                    updateButton();
                    stopStrings();
                };
            }
            audio.play().then(function() {
                isPlaying = true;
                updateButton();
                startStrings();
            }).catch(function(err) {
                console.error('Error:', err);
                isPlaying = false;
                updateButton();
            });
        }

        function pauseAudio() {
            if (audio) {
                audio.pause();
                audio.src = '';
                audio = null;
            }
            isPlaying = false;
            updateButton();
            stopStrings();
        }

        function updateButton() {
            if (isPlaying) {
                playBtn.textContent = '⏸';
                playBtn.classList.add('playing');
            } else {
                playBtn.textContent = '▶';
                playBtn.classList.remove('playing');
            }
        }

        function startStrings() {
            stopStrings();
            stringsInterval = setInterval(function() {
                var strings = stringsContainer.querySelectorAll('.string');
                for (var i = 0; i < strings.length; i++) {
                    strings[i].style.height = (Math.random() * 14 + 4) + 'px';
                }
            }, 100);
        }

        function stopStrings() {
            if (stringsInterval) {
                clearInterval(stringsInterval);
                stringsInterval = null;
            }
            var strings = stringsContainer.querySelectorAll('.string');
            for (var i = 0; i < strings.length; i++) {
                strings[i].style.height = '5px';
            }
        }

        // ─── METADATOS ───
        function fetchNowPlaying() {
            fetch(API_URL, {
                headers: { 'Authorization': 'Basic ' + btoa(API_KEY) }
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data && data.now_playing && data.now_playing.song) {
                    barTitle.textContent = data.now_playing.song.title || 'Música en vivo';
                    barArtist.textContent = data.now_playing.song.artist || 'Cambur Pintón';
                }
            })
            .catch(function() {
                barTitle.textContent = 'Cambur Pintón';
                barArtist.textContent = 'Sintoniza en vivo';
            });
        }

        setInterval(fetchNowPlaying, 15000);
        fetchNowPlaying();

        // ─── NOTICIAS ───
        var currentSlide = 0;
        var totalSlides = 0;

        function loadNews() {
            var newsContainer = document.getElementById('newsContainer');
            var newsTime = document.getElementById('newsTime');
            
            fetch(NEWS_URL)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data && data.noticias && data.noticias.length > 0) {
                    newsTime.textContent = '📅 ' + (data.actualizado || 'Reciente');
                    totalSlides = data.noticias.length;
                    
                    var slidesHTML = '';
                    var dotsHTML = '';
                    
                    for (var i = 0; i < data.noticias.length; i++) {
                        var item = data.noticias[i];
                        slidesHTML += '<div class="news-slide">' +
                            '<div class="news-category">' +
                                '<span class="news-category-icon">' + item.categoria.split(' ')[0] + '</span> ' +
                                item.categoria +
                            '</div>' +
                            '<div class="news-title">' + item.titulo + '</div>' +
                            '<div class="news-excerpt">' + item.resumen + '</div>' +
                        '</div>';
                        
                        dotsHTML += '<div class="news-dot' + (i === 0 ? ' active' : '') + '" onclick="goToSlide(' + i + ')"></div>';
                    }
                    
                    newsContainer.innerHTML = '<div style="position:relative;">' +
                        '<button class="news-nav prev" onclick="prevSlide()">◀</button>' +
                        '<div class="news-carousel"><div class="news-slides" id="newsSlides">' + slidesHTML + '</div></div>' +
                        '<button class="news-nav next" onclick="nextSlide()">▶</button>' +
                    '</div>' +
                    '<div class="news-dots" id="newsDots">' + dotsHTML + '</div>';
                    
                    currentSlide = 0;
                    updateSlides();
                }
            })
            .catch(function(err) {
                console.log('Noticias aún no disponibles');
                newsTime.textContent = '';
            });
        }

        function updateSlides() {
            var slides = document.getElementById('newsSlides');
            if (slides) {
                slides.style.transform = 'translateX(-' + (currentSlide * 100) + '%)';
            }
            var dots = document.querySelectorAll('.news-dot');
            for (var i = 0; i < dots.length; i++) {
                dots[i].classList.toggle('active', i === currentSlide);
            }
        }

        function nextSlide() {
            if (totalSlides === 0) return;
            currentSlide = (currentSlide + 1) % totalSlides;
            updateSlides();
        }

        function prevSlide() {
            if (totalSlides === 0) return;
            currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
            updateSlides();
        }

        function goToSlide(index) {
            currentSlide = index;
            updateSlides();
        }

        loadNews();

        // ─── TELEGRAM ───
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        // ─── LIMPIEZA ───
        window.addEventListener('beforeunload', function() {
            stopStrings();
        });
    </script>
</body>
</html>
