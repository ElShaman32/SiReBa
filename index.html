<!-- 🍌 HERO PINTÓN - VERSIÓN FINAL -->
<style>
    .hero {
        text-align: center;
        padding: 60px 20px 100px;
        background: linear-gradient(180deg, #0D2818 0%, #1A1A2E 100%);
        position: relative;
        overflow: hidden;
    }
    
    /* Detalles de hojas tropicales de fondo (sutiles) */
    .hero::before {
        content: '🍌 🎸 🍌 🎸 🍌';
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 40px;
        opacity: 0.08;
        white-space: nowrap;
        letter-spacing: 30px;
    }
    
    .logo-container {
        cursor: pointer;
        user-select: none;
        display: inline-block;
        transition: transform 0.2s;
        position: relative;
        z-index: 1;
    }
    
    .logo-container:active {
        transform: scale(0.95);
    }
    
    .logo-img {
        width: 180px;
        height: auto;
        max-width: 100%;
        filter: drop-shadow(0 0 30px rgba(124, 179, 66, 0.5));
        animation: float 3s ease-in-out infinite;
        border-radius: 50%;
        border: 3px solid rgba(124, 179, 66, 0.3);
        background: rgba(13, 40, 24, 0.6);
        padding: 10px;
    }
    
    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }
    
    .station-name {
        font-size: 42px;
        font-weight: 900;
        margin: 20px 0 10px;
        background: linear-gradient(45deg, #7CB342, #558B2F, #FFD700);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.2;
        position: relative;
        z-index: 1;
    }
    
    .tagline {
        font-size: 18px;
        color: #A5D6A7;
        margin-bottom: 30px;
        font-style: italic;
        position: relative;
        z-index: 1;
    }
    
    .btn-primary {
        display: inline-block;
        padding: 16px 40px;
        background: linear-gradient(135deg, #7CB342, #558B2F);
        color: white;
        border: none;
        border-radius: 50px;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
        box-shadow: 0 4px 20px rgba(124, 179, 66, 0.4);
        position: relative;
        z-index: 1;
    }
    
    .btn-primary:hover {
        background: linear-gradient(135deg, #8BC34A, #689F38);
        transform: translateY(-3px);
        box-shadow: 0 8px 30px rgba(124, 179, 66, 0.6);
    }
    
    /* Responsive */
    @media (max-width: 600px) {
        .station-name { font-size: 28px; }
        .logo-img { width: 120px; }
        .hero { padding: 40px 15px 80px; }
    }
</style>

<header class="hero">
    <div class="logo-container" id="logoContainer" title="Haz clic 4 veces para el easter egg... 🍌🎸">
        <img src="https://radio.camburpinton.com.ve/static/uploads/background.1778449035.png" alt="Cambur Pintón" class="logo-img" id="logoImg">
    </div>
    <h1 class="station-name">Cambur Pintón</h1>
    <p class="tagline">🎙️ La Radio Más Chevere de Venezuela 🎙️</p>
    <button class="btn-primary" onclick="document.getElementById('playerBar').scrollIntoView({behavior:'smooth'}); if(!isPlaying) togglePlay();">
        🎧 ¡ESCUCHAR EN VIVO!
    </button>
    <p class="hero-subtitle" style="font-size:15px; color:#A5D6A7; margin-top:15px; font-style:italic; position:relative; z-index:1;">
        🎸 Con El Cuatro Bien Afinado
    </p>
</header>
